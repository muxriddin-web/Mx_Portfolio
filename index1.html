<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfolio Loading Screen">
    <title>Portfolio Loading</title>

    <link rel="stylesheet" href="./Portfolio1/css/loading.css">
</head>

<body>

    <!-- Background Video -->
    <video
        id="bg-video"
        autoplay
        muted
        playsinline
        preload="auto">
    </video>

    <!-- Background Audio -->
    <audio
        id="bg-audio"
        preload="auto">
        <source src="./gta video_[cut_16sec].mp3" type="audio/mpeg">
    </audio>

    <!-- Start Button -->
    <button id="button1" type="button">
        Boshlash
    </button>

    <!-- Next Button -->
    <div id="button2">
        <a href="./Portfolio1/index.html">
            Keyingisi
        </a>
    </div>

    <!-- Logo -->
    <div class="logo-container">

        <div class="logo" id="logo">

            <div class="r-star">

                <span class="r" id="letter">
                    <i>R</i>
                </span>

                <span class="star" id="star">

                    <svg viewBox="0 0 24 24">

                        <path
                            fill="white"
                            stroke="black"
                            stroke-width="1.5"
                            d="m12 2.124 2.586 8.212h8.473l-6.845 4.964 2.587 8.212-6.846-4.964-6.847 4.964 2.587-8.212-6.846-4.964h8.474z"/>

                    </svg>

                </span>

            </div>

        </div>

    </div>

    <script src="./Portfolio1/js/loading.js"></script>

</body>

</html>
