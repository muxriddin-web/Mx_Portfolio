<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MX Portfolio</title>
    <link rel="icon" type="image/svg+xml" href="./logosvg/rockstar-games.svg"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/png" href="cojo.ru/grafika/gta-logotip-19-foto.">
    <link rel="stylesheet" href="./css/portfolio1.css">
</head>
<body class="text">

    <!-- Cursor -->
    <div class="custom-cursor"></div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo glow-text">
            <h2>Portfolio VI</h2>
        </div>

        <ul class="nav-links">
          <li>
              <a href="portfolio1.html" class="glow-link">
                  <i class="fas fa-house"></i>
                  <span>Home</span>
              </a>
          </li>
          <li>
              <a href="about.html" class="glow-link">
                  <i class="fas fa-user"></i>
                  <span>About</span>
              </a>
          </li>
          <li>
              <a href="skills.html" class="glow-link">
                  <i class="fas fa-code"></i>
                  <span>Skills</span>
              </a>
          </li>
          <li>
              <a href="projects.html" class="glow-link">
                  <i class="fas fa-layer-group"></i>
                  <span>Projects</span>
              </a>
          </li>
          <li>
              <a href="contact.html" class="glow-link">
                  <i class="fas fa-envelope"></i>
                  <span>Contact</span>
              </a>
          </li>
      </ul>
    </nav>

    <!-- Notification -->
    <!-- <div id="notification" class="notification"></div> -->

    <!-- Main Content -->
    <main>

        <!-- Home (USTKI PARDA) -->
        <section id="home-page" class="page home">
            <div class="particle-background"></div>

            <div class="content">
                <div class="content">
                  <h1 class="glitch">WEB Developers</h1>
                  <br>
                  <p class="typing-text">SJM Developer</p>
              </div>
              <br>
              <br>

                <div class="cta-buttons">
                    <a href="./contact.html" class="glow-button">Hire Me</a>
                    <a href="./projects.html" class="glow-button outline">View Work</a>
                </div>
            </div>

            <div class="scroll-arrow">▼ DOWN ▼</div>
        </section>
    </main>

    <!-- GTA REVEAL FOOTER — Home skroll bilan yuqoriga surilganda ostidan ochiladi -->
    <div class="gta-reveal-footer" id="gta-overlay">
        <div id="p-bg" class="parallax-bg"></div>

        <div class="scene-3d" id="scene-container">
            <div id="p-char" class="character-container">
                <img class="hologram-man" src="./imges/Scrollimg3.png" alt="Gunman" />

                <div id="barrel-glow" class="barrel-glow-effect"></div>

                <div id="flash-effect" class="muzzle-flash"></div>
                <div id="bullet-effect" class="real-3d-bullet"></div>
            </div>

            <div id="p-hud" class="gta-hud-container">
                <h1 class="hud-title">MISSION:  Question yes or no</h1>
                <p class="hud-desc">Did you like my portfolio?</p>

                <div class="btn-wrapper">
                    <button id="yes-trigger" class="hud-btn btn-yes">Yes of course</button>
                    <button id="no-trigger" class="hud-btn btn-no">No</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Back To Top -->
    <button id="back-to-top" class="back-to-top glow-button">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script src="./js/portfolio1.js"></script>

</body>
</html>
